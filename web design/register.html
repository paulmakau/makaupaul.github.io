<!DOCTYPE html>
<html>
<head>
    <title>CampusConnect - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Event Registration</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="events.html">Events</a>
    <a href="register.html">Register</a>
</nav>

<form id="regForm" onsubmit="return validateForm()">
    <label>Student Admission Number:</label>
    <input type="text" id="admission"><br><br>

    <label>Name:</label>
    <input type="text" id="name"><br><br>

    <label>Select Event:</label>
    <select>
        <option>Cultural Week</option>
        <option>Sports Day</option>
        <option>Students Election</option>
        <option>Tree Planting Day</option>
    </select><br><br>

    <label>Email Address:</label>
    <input type="text" id="email"><br><br>

    <button type="submit">Submit</button>
</form>

<script>
function validateForm() {
    let admission = document.getElementById("admission").value;
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;

    if (admission == "" || name == "" || email == "") {
        alert("All fields are required!");
        return false;
    }

    if (!email.includes("@")) {
        alert("Enter a valid email address!");
        return false;
    }

    alert("Registration Successful!");
    return true;
}
</script>

</body>
</html>
